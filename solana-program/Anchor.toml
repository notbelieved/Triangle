[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
triangle_escrow = "7RnW9zpz4vwmebbPJqh5hSTdvUSrFGdZGZYWFZSbfgcV"

[programs.localnet]
triangle_escrow = "7RnW9zpz4vwmebbPJqh5hSTdvUSrFGdZGZYWFZSbfgcV"

[registry]
url = "https://api.apr.dev"

[provider]
# localnet so `anchor test` deploys to the ephemeral local validator (no funded devnet wallet required).
# Deploy to devnet: anchor deploy --provider.cluster devnet
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
