<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triangle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: #fff; }

      #splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      }
      #splash.hide {
        opacity: 0;
        transform: scale(1.015);
        pointer-events: none;
      }
      .splash-mark {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: splash-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes splash-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .splash-triangle {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #4f3ec8 0%, #6d5bd2 100%);
        clip-path: polygon(50% 8%, 96% 92%, 4% 92%);
        animation: splash-pulse 1.8s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.7; transform: scale(0.92); }
      }
      .splash-dots {
        display: flex;
        gap: 6px;
      }
      .splash-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #c4bedd;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0.75); opacity: 0.4; }
        40%            { transform: scale(1);    opacity: 1; }
      }

      #root { animation: root-reveal 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }
      @keyframes root-reveal {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-mark">
        <div class="splash-triangle"></div>
        <div class="splash-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
